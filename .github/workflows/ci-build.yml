name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: build
          key: windows-x86-cmake-vs2022-v1

      - name: Configure
        run: |
          cmake \
            -B build \
            -G "Visual Studio 17 2022" \
            -A Win32 \
            # EOL

      - name: Build
        run: |
          cmake \
            --build build \
            --config RelWithDebInfo \
            # EOL

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fallout2-re
          path:  build/RelWithDebInfo/fallout2-re.exe
          retention-days: 7
